<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Distribution Flow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fafaf8;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    min-height: 100vh;
    overflow: hidden;
  }

  .wrap {
    width: 960px;
    height: 560px;
    position: relative;
    background: #fafaf8;
    overflow: hidden;
    flex-shrink: 0;
  }

  svg.canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  /* ── Nodes ───────────────────────────── */

  .node {
    position: absolute;
    background: #ffffff;
    border: 1.5px solid #dddbd6;
    border-radius: 3px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    transition: border-color 0.25s ease, box-shadow 0.25s ease;
  }

  .node.lit {
    border-color: #c8873a;
    box-shadow: 0 0 0 3px rgba(200, 135, 58, 0.10);
  }

  .node-eyebrow {
    font-family: 'Courier New', monospace;
    font-size: 8px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #a8a49e;
  }

  .node-title {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #1a1a1a;
    font-weight: 700;
  }

  /* Content Library */
  #n-library {
    left: 52px;
    top: 180px;
    width: 164px;
    height: 136px;
    padding: 14px 12px 10px;
    justify-content: flex-start;
    gap: 0;
  }

  .thumb {
    width: 100%;
    height: 76px;
    background: #f2ede7;
    border: 1px solid #e4e0da;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
    flex-shrink: 0;
    position: relative;
  }

  .thumb-lines {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 5px;
    padding: 0 20px;
    opacity: 0.35;
  }

  .thumb-line {
    height: 2px;
    background: #c0bbb4;
    border-radius: 1px;
  }

  .thumb-line:nth-child(2) { width: 70%; }
  .thumb-line:nth-child(3) { width: 50%; }

  .play-ring {
    width: 26px;
    height: 26px;
    border: 1.5px solid #b0aba4;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .play-ring::after {
    content: '';
    width: 0;
    height: 0;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-left: 10px solid #b0aba4;
    margin-left: 2px;
  }

  /* One Action */
  #n-action {
    left: 405px;
    top: 232px;
    width: 148px;
    height: 72px;
  }

  /* Destination nodes */
  .n-dest {
    right: 52px;
    width: 152px;
    height: 54px;
  }

  #n-athletes { top: 113px; }
  #n-teams    { top: 207px; }
  #n-sponsors { top: 301px; }
  #n-social   { top: 395px; }

  /* ── Distributed label ───────────────── */

  #dist-label {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #c8873a;
    opacity: 0;
    transition: opacity 0.7s ease;
    white-space: nowrap;
  }

  #dist-label.show { opacity: 1; }

  /* ── Step counter ────────────────────── */

  #step-track {
    position: absolute;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .step-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #dddbd6;
    transition: background 0.3s ease;
  }

  .step-dot.on { background: #c8873a; }
</style>
</head>
<body>
<div class="wrap" id="wrap">

  <!-- Step tracker -->
  <div id="step-track">
    <div class="step-dot" id="sd0"></div>
    <div class="step-dot" id="sd1"></div>
    <div class="step-dot" id="sd2"></div>
  </div>

  <!-- SVG layer for lines + dots -->
  <svg class="canvas" id="svg"></svg>

  <!-- Content Library -->
  <div class="node" id="n-library">
    <div class="thumb">
      <div class="thumb-lines">
        <div class="thumb-line"></div>
        <div class="thumb-line"></div>
        <div class="thumb-line"></div>
      </div>
      <div class="play-ring"></div>
    </div>
    <span class="node-eyebrow">source</span>
    <span class="node-title">Content Library</span>
  </div>

  <!-- One Action -->
  <div class="node" id="n-action">
    <span class="node-eyebrow">trigger point</span>
    <span class="node-title">One Action</span>
  </div>

  <!-- Destinations -->
  <div class="node n-dest" id="n-athletes">
    <span class="node-eyebrow">route 01</span>
    <span class="node-title">Athletes</span>
  </div>
  <div class="node n-dest" id="n-teams">
    <span class="node-eyebrow">route 02</span>
    <span class="node-title">Teams</span>
  </div>
  <div class="node n-dest" id="n-sponsors">
    <span class="node-eyebrow">route 03</span>
    <span class="node-title">Sponsors</span>
  </div>
  <div class="node n-dest" id="n-social">
    <span class="node-eyebrow">route 04</span>
    <span class="node-title">Social Channels</span>
  </div>

  <!-- Distributed label -->
  <div id="dist-label">Distributed ✓</div>

</div>

<script>
const SVG_NS = 'http://www.w3.org/2000/svg';
const svg    = document.getElementById('svg');
const wrap   = document.getElementById('wrap');

let _timeouts = [];
let _rafs     = [];

function defer(fn, ms) {
  _timeouts.push(setTimeout(fn, ms));
}

function raf(fn) {
  _rafs.push(requestAnimationFrame(fn));
}

function killAll() {
  _timeouts.forEach(clearTimeout);
  _rafs.forEach(cancelAnimationFrame);
  _timeouts = [];
  _rafs     = [];
}

/* ── Geometry helpers ─────────────────────────── */

function nodeEdge(el, side) {
  const wr = wrap.getBoundingClientRect();
  const r  = el.getBoundingClientRect();
  const my = r.top - wr.top + r.height / 2;
  if (side === 'right') return { x: r.right - wr.left, y: my };
  if (side === 'left')  return { x: r.left  - wr.left, y: my };
  return { x: r.left - wr.left + r.width / 2, y: my };
}

/* ── SVG helpers ──────────────────────────────── */

function makeLine(x1, y1, x2, y2, color, id) {
  const l = document.createElementNS(SVG_NS, 'line');
  l.setAttribute('x1', x1); l.setAttribute('y1', y1);
  l.setAttribute('x2', x2); l.setAttribute('y2', y2);
  l.setAttribute('stroke', color);
  l.setAttribute('stroke-width', '1.5');
  if (id) l.id = id;
  svg.appendChild(l);
  return l;
}

function setLineColor(id, color) {
  const el = document.getElementById(id);
  if (el) el.setAttribute('stroke', color);
}

function makeDot(x, y) {
  const c = document.createElementNS(SVG_NS, 'circle');
  c.setAttribute('r', '5');
  c.setAttribute('fill', '#c8873a');
  c.setAttribute('cx', x);
  c.setAttribute('cy', y);
  svg.appendChild(c);
  return c;
}

/* ── Easing ───────────────────────────────────── */

function easeInOut(t) {
  return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
}

/* ── Animated dot travel ─────────────────────── */

function travelDot(x1, y1, x2, y2, duration, onDone) {
  const dot   = makeDot(x1, y1);
  const start = performance.now();

  function step(now) {
    const p = Math.min((now - start) / duration, 1);
    const t = easeInOut(p);
    dot.setAttribute('cx', x1 + (x2 - x1) * t);
    dot.setAttribute('cy', y1 + (y2 - y1) * t);
    if (p < 1) {
      raf(step);
    } else {
      svg.removeChild(dot);
      onDone && onDone();
    }
  }
  raf(step);
}

/* ── Step indicators ─────────────────────────── */

function stepOn(i) {
  document.querySelectorAll('.step-dot').forEach((d, idx) => {
    d.classList.toggle('on', idx <= i);
  });
}

/* ── Reset ────────────────────────────────────── */

function reset() {
  svg.innerHTML = '';
  ['n-library','n-action','n-athletes','n-teams','n-sponsors','n-social']
    .forEach(id => document.getElementById(id).classList.remove('lit'));
  document.getElementById('dist-label').classList.remove('show');
  document.querySelectorAll('.step-dot').forEach(d => d.classList.remove('on'));
}

/* ── Main sequence ────────────────────────────── */

function run() {
  killAll();
  reset();

  const lib     = document.getElementById('n-library');
  const action  = document.getElementById('n-action');
  const destIds = ['n-athletes','n-teams','n-sponsors','n-social'];
  const dests   = destIds.map(id => document.getElementById(id));

  const libR    = nodeEdge(lib,    'right');
  const actL    = nodeEdge(action, 'left');
  const actR    = nodeEdge(action, 'right');
  const destLs  = dests.map(d => nodeEdge(d, 'left'));

  // Draw all lines (muted initially)
  makeLine(libR.x, libR.y, actL.x, actL.y, '#dddbd6', 'l-main');
  destLs.forEach((dl, i) =>
    makeLine(actR.x, actR.y, dl.x, dl.y, '#dddbd6', `l-dest-${i}`)
  );

  // Phase 0 — light library
  defer(() => {
    lib.classList.add('lit');
    stepOn(0);
  }, 300);

  // Phase 1 — dot: library → one action
  defer(() => {
    setLineColor('l-main', '#c8873a');
    travelDot(libR.x, libR.y, actL.x, actL.y, 750, () => {

      // Phase 2 — light one action
      action.classList.add('lit');
      stepOn(1);

      // Phase 3 — simultaneously fire to all 4
      defer(() => {
        let arrived = 0;
        destLs.forEach((dl, i) => {
          setLineColor(`l-dest-${i}`, '#c8873a');
          travelDot(actR.x, actR.y, dl.x, dl.y, 580, () => {
            dests[i].classList.add('lit');
            arrived++;
            if (arrived === 4) {
              stepOn(2);
              // Phase 4 — distributed label
              defer(() => {
                document.getElementById('dist-label').classList.add('show');
                // Phase 5 — pause then loop
                defer(run, 3200);
              }, 350);
            }
          });
        });
      }, 220);
    });
  }, 600);
}

window.addEventListener('load', run);
</script>
</body>
</html>
